<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cat Forest Run</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <button id="muteButton" class="mute-button" type="button" aria-pressed="false" aria-label="Mute audio">Sound On</button>
    <canvas id="game" width="960" height="540" aria-label="Cat Forest Run playable game"></canvas>

    <div class="touch-controls" aria-hidden="true">
      <button type="button" data-control="left">Left</button>
      <button type="button" data-control="right">Right</button>
      <button type="button" data-control="jump">Jump</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
